app = "kutur-labs-marcel"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[experimental]
  machine_config = "fly-machine.json"
  container = "marcel"

[env]
  HERMES_UID = "10000"
  HERMES_GID = "10000"
  TS_HOSTNAME = "marcel"

[[mounts]]
  source = "hermes_data"
  destination = "/opt/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory = "2048mb"
